<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hizliyim.com | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #027AFF;
            --brand-red: #FF3B30;
            --glass-blur: 40px;
            --neon-green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; 
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        /* Gece Gökyüzü alicimmmm */
        .night-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #050515 0%, #000000 100%);
            z-index: -2;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* LOGO BEYAZLATMA VE GLOW ALICIMMMM */
        .white-invert-logo {
            filter: invert(1) brightness(2) drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        .neon-logo-glow {
            filter: invert(1) brightness(2) drop-shadow(0 0 10px rgba(2, 122, 255, 0.8));
        }

        .logo-pulse-anim {
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 0.8; filter: invert(1) brightness(1.5) drop-shadow(0 0 5px rgba(2, 122, 255, 0.4)); transform: scale(1); }
            50% { opacity: 1; filter: invert(1) brightness(2.5) drop-shadow(0 0 15px rgba(2, 122, 255, 0.9)); transform: scale(1.03); }
        }

        /* Apple Style Glassmorphism alicimmmm */
        .glass-panel-login {
            background: linear-gradient(135deg, rgba(2, 122, 255, 0.45), rgba(0, 80, 200, 0.35));
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 35px;
            box-shadow: 0 30px 80px -12px rgba(2, 122, 255, 0.45);
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(2, 122, 255, 0.18), rgba(0, 40, 120, 0.25));
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-top: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(2, 122, 255, 0.22), rgba(0, 30, 90, 0.28));
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .glowing-logo {
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(2, 122, 255, 0.8);
            cursor: pointer;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            font-variant-ligatures: none;
            transform: translateZ(0); 
            height: 32px;
            white-space: nowrap;
        }

        /* Face ID Style Notification Bar alicimmmm */
        #root-welcome-bar {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px) scale(0.7);
            z-index: 6000;
            opacity: 0;
            min-width: 300px;
            border-radius: 40px;
            padding: 14px 26px;
            pointer-events: none;
            transition: all 1.3s cubic-bezier(0.23, 1, 0.32, 1);
            background: rgba(15, 15, 20, 0.9);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        #root-welcome-bar.active { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
        #root-welcome-bar.exit { transform: translateX(-50%) translateY(-150px) scale(0.85); opacity: 0; filter: blur(20px); }

        .streak-container {
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1.5px;
            background: transparent;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .streak-line {
            position: absolute;
            inset: -100%;
            background: conic-gradient(from 0deg, transparent 75%, rgba(2, 122, 255, 0.8), transparent 100%);
            animation: rotateStreak 3s linear infinite;
        }

        @keyframes rotateStreak { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Fixed Header alicimmmm */
        .global-sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 5000;
            padding: 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .global-sticky-header > .glass-panel {
            pointer-events: auto;
            border-radius: 24px;
        }

        /* Account Button alicimmmm */
        .account-toggle-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        .account-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 170px;
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 5100;
            background: rgba(15, 15, 18, 0.96);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 6px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
        }
        .account-dropdown.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        
        /* Çıkış Ekranı alicimmmm */
        #exit-overlay {
            position: fixed; inset: 0; z-index: 9000; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(0px);
            display: none; align-items: center; justify-content: center; opacity: 0;
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #exit-overlay.active { opacity: 1; backdrop-filter: blur(40px); }

        .exit-glass-panel {
            width: 290px; aspect-ratio: 1/1;
            background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: scale(0.8) translateY(20px); opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }
        #exit-overlay.active .exit-glass-panel { transform: scale(1) translateY(0); opacity: 1; }

        .spinner-red {
            width: 50px; height: 50px; border: 4px solid rgba(255, 59, 48, 0.1); border-top: 4px solid var(--brand-red);
            border-radius: 50%; animation: spin-calm 1.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }
        @keyframes spin-calm { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Chat Layout alicimmmm */
        #view-chat {
            position: fixed; inset: 0; z-index: 4000;
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(45px);
            display: none; 
            overflow-y: auto; 
            padding-bottom: 24px;
        }
        #view-chat.show { display: block; opacity: 1; }

        .chat-sheet {
            margin: 110px auto 24px; 
            width: calc(100% - 32px); max-width: 800px;
            display: flex; flex-direction: column; 
            min-height: calc(100vh - 134px); 
            height: auto; 
            position: relative;
            transform: translateX(0); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            background: linear-gradient(135deg, rgba(2, 122, 255, 0.18), rgba(0, 40, 120, 0.25));
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }
        .chat-sheet.exit { transform: translateX(100%); opacity: 0; }

        /* Bütünleşik Mesaj Alanı alicimmmm */
        .chat-bottom-container {
            width: 100%;
            padding: 16px 24px 24px;
            background: rgba(2, 122, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .chat-input-wrapper {
            background: rgba(2, 122, 255, 0.15);
            border: 1px solid rgba(2, 122, 255, 0.3); 
            border-radius: 20px;
            padding: 6px 10px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .chat-input-wrapper:focus-within { border-color: var(--brand-blue); background: rgba(2, 122, 255, 0.25); }

        .chat-textarea {
            flex: 1; background: transparent; border: none; outline: none; color: white;
            font-size: 14px; padding: 10px 4px; max-height: 140px; min-height: 40px;
            resize: none; line-height: 1.5; overflow: hidden;
        }

        /* Message Bubbles alicimmmm */
        .msg-bubble {
            max-width: 80%;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13.5px;
            font-weight: 500;
            line-height: 1.4;
            position: relative;
            animation: messageSpring 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        /* Smooth Typing alicimmmm */
        .typing-indicator {
            display: flex; align-items: center; gap: 4px;
            padding: 12px 20px; background: rgba(2, 122, 255, 0.1);
            border-radius: 22px; width: fit-content; margin-bottom: 10px;
        }
        .typing-dot {
            width: 5px; height: 5px; background: #fff; border-radius: 50%; opacity: 0.35;
            animation: appleTyping 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; } .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes appleTyping { 0%, 60%, 100% { transform: translateY(0); opacity: 0.35; } 30% { transform: translateY(-6px); opacity: 0.9; } }
        @keyframes messageSpring { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* General UI alicimmmm */
        .neon-dot { width: 8px; height: 8px; background-color: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green); }
        .input-dark { background-color: rgba(2, 122, 255, 0.1) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; color: white; outline: none; width: 100%; }
        .btn-send-apple { width: 38px; height: 38px; background: var(--brand-blue); border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; margin-bottom: 4px; }
        .btn-send-apple:active { transform: scale(0.85); }
    </style>
</head>
<body>

    <div class="night-bg"></div>
    <div id="stars-field" class="stars-container"></div>

    <!-- Face ID Notification Bar - WHITE LOGO ALICIMMMM -->
    <div id="root-welcome-bar">
        <div class="streak-container"><div class="streak-line"></div></div>
        <div class="relative flex items-center justify-center space-x-4">
            <!-- Logon bembeyaz ve neon glow ile geliyor alicimmmm (logolast.png) -->
            <img src="logolast.png" alt="Logo" class="w-7 h-7 object-contain neon-logo-glow" onerror="this.style.display='none'">
            <span class="text-[12px] font-bold tracking-[0.1em] uppercase text-white/90">Hoşgeldiniz, sistem sahibi</span>
        </div>
    </div>

    <!-- Exit Overlay alicimmmm -->
    <div id="exit-overlay">
        <div class="exit-glass-panel">
            <div class="spinner-red"></div>
            <div class="flex flex-col items-center mt-8 text-center">
                <h2 class="text-white/90 font-medium text-sm">Çıkış yapılıyor...</h2>
                <p class="text-[10px] opacity-20 mt-3 lowercase tracking-widest">hizliyim.com</p>
            </div>
        </div>
    </div>

    <!-- Fixed Header alicimmmm -->
    <div id="global-header" class="hidden global-sticky-header">
        <div class="glass-panel flex items-center justify-between px-6 py-3">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-black glowing-logo" onclick="goHome()">hizliyim.com</span>
            </div>
            <div class="account-wrapper">
                <button id="account-toggle" class="account-toggle-btn">
                    <div class="flex flex-col items-start leading-none text-right">
                        <span class="text-[7px] font-bold opacity-30 uppercase tracking-[0.2em] mb-1">Hesap</span>
                        <span class="text-[12px] font-bold text-blue-400">alicelik - yönetici</span>
                    </div>
                    <svg class="w-3.5 h-3.5 opacity-20 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="account-menu" class="account-dropdown">
                    <button class="dropdown-item cursor-default opacity-40">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                        <span>Yönetim Paneli</span>
                    </button>
                    <button id="do-logout" class="dropdown-item logout">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        <span>Çıkış Yap</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login View - WHITE LOGO ALICIMMMM -->
    <div id="view-login" class="flex flex-col items-center justify-center min-h-screen p-6 opacity-0 transition-all duration-1000">
        <div class="glass-panel-login p-10 w-full max-w-[360px] flex flex-col items-center">
            
            <div class="mb-6 flex flex-col items-center">
                <!-- Siyah logolast.png burda bembeyaz parlayacak alicimmmm -->
                <img src="logolast.png" alt="Main Logo" class="w-16 h-16 object-contain logo-pulse-anim mb-4" onerror="this.style.display='none'">
                <div class="text-center">
                    <p class="text-[9px] font-bold tracking-[0.8em] uppercase opacity-40 mb-3">Güvenli Protokol</p>
                    <h1 class="glowing-logo text-4xl cursor-default">hizliyim.com</h1>
                </div>
            </div>
            
            <div id="login-container" class="w-full relative min-h-[220px] flex items-center justify-center">
                <div id="login-form-ui" class="w-full space-y-4 transition-all duration-500">
                    <input type="text" id="username" placeholder="kullanıcı adı" class="input-dark p-4 text-sm">
                    <input type="password" id="password" placeholder="şifre" class="input-dark p-4 text-sm">
                    <button id="do-login" class="bg-[#027AFF] w-full p-4 mt-2 text-sm font-bold uppercase tracking-widest rounded-2xl transition-all shadow-lg shadow-blue-600/40 active:scale-95">Sisteme Bağlan</button>
                    <div id="login-err" class="hidden text-red-500 text-[11px] text-center font-bold mt-2">Erişim anahtarı hatalı.</div>
                </div>

                <div id="login-process-ui" class="hidden absolute inset-0 flex flex-col items-center justify-center transition-all duration-500">
                    <div class="w-12 h-12 border-4 border-blue-500/10 border-t-blue-500 rounded-full animate-spin mb-6"></div>
                    <div class="text-center">
                        <p class="text-[11px] font-bold text-white/90 uppercase tracking-[0.3em] mb-1">Kimlik Doğrulanıyor</p>
                        <p class="text-[9px] opacity-20 lowercase italic">güvenli oturum açılıyor...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard View alicimmmm -->
    <div id="view-dashboard" class="hidden min-h-screen pt-[100px] pb-20 px-4 transition-all duration-1000">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="stat-card">
                <div class="flex flex-col">
                    <span class="text-[8px] font-bold opacity-20 uppercase tracking-widest">Oturum</span>
                    <span id="active-stat" class="text-2xl font-black text-blue-400 mt-1">1,214</span>
                </div>
                <svg class="w-5 h-5 text-blue-500/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-width="2"></path></svg>
            </div>
            <div class="stat-card">
                <div class="flex flex-col">
                    <span class="text-[8px] font-bold opacity-20 uppercase tracking-widest">Sistem</span>
                    <span class="text-2xl font-black text-green-400 mt-1 tracking-tighter">STABLE</span>
                </div>
                <div class="neon-dot"></div>
            </div>
        </div>
        
        <div class="glass-panel flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/5 bg-white/[0.02]">
                <div class="relative">
                    <input type="text" id="user-search" placeholder="kullanıcı ara..." class="input-dark pl-12 pr-5 py-4 text-xs">
                    <svg class="w-5 h-5 absolute left-4 top-3.5 opacity-25" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            <div id="users-list" class="flex flex-col p-4"></div>
        </div>
    </div>

    <!-- Chat View alicimmmm -->
    <div id="view-chat">
        <div id="chat-sheet-panel" class="chat-sheet">
            <header class="p-6 flex items-center justify-between border-b border-white/5 bg-white/[0.03] sticky top-0 z-[101] backdrop-blur-3xl">
                <div class="flex items-center space-x-4">
                    <button id="chat-exit-btn" class="w-11 h-11 glass-panel flex items-center justify-center hover:bg-white/10 transition-all shadow-xl">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div class="flex flex-col leading-tight">
                        <span id="chat-user-title" class="text-base font-black text-blue-400 lowercase">kullanıcı</span>
                        <span class="text-[10px] opacity-30 font-bold uppercase tracking-widest mt-1">Sohbet Aktif</span>
                    </div>
                </div>
                <div class="neon-dot"></div>
            </header>

            <div id="chat-content" class="p-7 flex flex-col flex-grow"></div>

            <div id="typing-container" class="px-7 py-2 hidden">
                <div class="typing-indicator">
                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
            </div>

            <!-- Bütünleşik Mesaj Alanı alicimmmm -->
            <div class="chat-bottom-container mt-auto">
                <div class="chat-input-wrapper">
                    <textarea id="chat-msg-input" placeholder="mesajınızı yazın..." class="chat-textarea" rows="1" autocapitalize="none"></textarea>
                    <button id="chat-send" class="btn-send-apple">
                        <svg class="w-6 h-6 text-white translate-x-[2px]" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sContainer = document.getElementById('stars-field');
        for (let i = 0; i < 150; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 1.8 + 0.5 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.setProperty('--duration', (Math.random() * 5 + 3) + 's');
            sContainer.appendChild(s);
        }

        window.onload = () => { document.getElementById('view-login').style.opacity = '1'; };

        let usersData = [];
        let currentActive = 1214;
        let targetActive = 1214;
        let isFirstMessageForKaany = true; 
        let currentChatNick = '';

        const loginEl = document.getElementById('view-login');
        const dashEl = document.getElementById('view-dashboard');
        const chatEl = document.getElementById('view-chat');
        const globalHeader = document.getElementById('global-header');
        const userListUI = document.getElementById('users-list');
        const searchInput = document.getElementById('user-search');
        const activeCountUI = document.getElementById('active-stat');
        const accountToggle = document.getElementById('account-toggle');
        const accountMenu = document.getElementById('account-menu');
        const logoutBtn = document.getElementById('do-logout');
        const exitOverlay = document.getElementById('exit-overlay');
        const chatSheetPanel = document.getElementById('chat-sheet-panel');
        const chatInput = document.getElementById('chat-msg-input');
        const welcomeBar = document.getElementById('root-welcome-bar');

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function goHome() {
            chatSheetPanel.classList.add('exit');
            dashEl.classList.remove('blurred');
            setTimeout(() => {
                chatEl.style.display = 'none';
                chatEl.classList.remove('show');
                chatSheetPanel.classList.remove('exit');
                document.body.style.overflow = 'auto';
            }, 600);
        }

        document.getElementById('do-login').addEventListener('click', () => {
            const u = document.getElementById('username').value.toLowerCase();
            const p = document.getElementById('password').value;
            if (u === 'alicelik' && p === 'alikingytyt6565') {
                document.getElementById('login-form-ui').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-form-ui').classList.add('hidden');
                    document.getElementById('login-process-ui').classList.remove('hidden');
                    document.getElementById('login-process-ui').style.display = 'flex';
                    
                    setTimeout(() => {
                        loginEl.style.opacity = '0';
                        loginEl.style.transform = 'scale(1.1)';
                        setTimeout(() => {
                            loginEl.classList.add('hidden');
                            dashEl.classList.remove('hidden');
                            globalHeader.classList.remove('hidden');
                            requestAnimationFrame(() => {
                                dashEl.style.opacity = '1';
                                initUsers(); startUpdateLoop(); startCountInterpolation();
                                setTimeout(() => {
                                    welcomeBar.classList.add('active');
                                    setTimeout(() => {
                                        welcomeBar.classList.add('exit');
                                        setTimeout(() => welcomeBar.classList.remove('active', 'exit'), 1500);
                                    }, 4000);
                                }, 800);
                            });
                        }, 600);
                    }, 2500);
                }, 400);
            } else {
                document.getElementById('login-err').classList.remove('hidden');
                setTimeout(() => document.getElementById('login-err').classList.add('hidden'), 2000);
            }
        });

        logoutBtn.addEventListener('click', () => {
            accountMenu.classList.remove('show');
            exitOverlay.style.display = 'flex';
            void exitOverlay.offsetWidth;
            exitOverlay.classList.add('active');
            setTimeout(() => { location.reload(); }, 2500);
        });

        accountToggle.addEventListener('click', (e) => { e.stopPropagation(); accountMenu.classList.toggle('show'); });
        document.addEventListener('click', () => accountMenu.classList.remove('show'));

        function startCountInterpolation() {
            setInterval(() => { targetActive += (Math.random() > 0.5 ? 1 : -1) * Math.floor(Math.random() * 5); }, 3000);
            setInterval(() => {
                if (currentActive < targetActive) currentActive++; else if (currentActive > targetActive) currentActive--;
                activeCountUI.innerText = currentActive.toLocaleString();
            }, 150);
        }

        function initUsers() {
            const fNames = ["aras", "can", "mert", "bora", "emir", "fatih", "yigit", "utku", "alper", "onur", "kerem", "burak", "emre", "deniz", "selim", "serkan", "melih", "tolga", "berk"];
            usersData = [{ id: "KNY", nick: "kaany", fullName: "Kaan", isFav: true }];
            for (let i = 0; i < 40; i++) {
                const f = fNames[Math.floor(Math.random() * fNames.length)];
                usersData.push({ id: Math.random().toString(36).substr(2, 4).toUpperCase(), nick: `${f}${Math.floor(Math.random()*99)}`, fullName: `${f} User`, isFav: false });
            }
            renderUsers();
        }

        function renderUsers() {
            userListUI.innerHTML = '';
            usersData.filter(u => u.nick.includes(searchInput.value.toLowerCase())).forEach(u => {
                const card = document.createElement('div');
                card.className = `flex items-center justify-between cursor-pointer group border-b border-white/[0.04] py-4 px-2 hover:bg-white/[0.02] transition-colors`;
                card.onclick = () => openDirectChat(u);
                card.innerHTML = `
                    <div class="flex items-center space-x-5">
                        <div class="w-12 h-12 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-[11px] font-black text-blue-400">
                            ${u.nick.substring(0, 2).toUpperCase()}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold tracking-tight">${u.nick} ${u.isFav ? '<span class="text-[12px] opacity-40 ml-1">★</span>' : ''}</span>
                            <span class="text-[11px] opacity-30 lowercase tracking-tight">${u.fullName}</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 bg-green-500/[0.05] px-4 py-1.5 rounded-xl border border-green-500/10">
                        <div class="neon-dot"></div>
                        <span class="text-[10px] text-green-500 font-bold uppercase">Online</span>
                    </div>
                `;
                userListUI.appendChild(card);
            });
        }

        searchInput.addEventListener('input', renderUsers);
        function startUpdateLoop() { setInterval(() => { if (!searchInput.value) { initUsers(); } }, 10000); }

        function openDirectChat(user) {
            currentChatNick = user.nick;
            document.getElementById('chat-user-title').innerText = user.nick;
            document.getElementById('chat-content').innerHTML = '';
            chatEl.style.display = 'block';
            void chatEl.offsetWidth;
            chatEl.classList.add('show');
            dashEl.classList.add('blurred');
            document.body.style.overflow = 'hidden';
            isFirstMessageForKaany = true; 
            window.scrollTo(0, 0);
        }

        document.getElementById('chat-exit-btn').addEventListener('click', goHome);

        function sendMsg(txt, role = 'sent') {
            const timeStr = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            const bubbleWrap = document.createElement('div');
            bubbleWrap.className = `flex flex-col mb-2.5 ${role === 'sent' ? 'items-end' : 'items-start'}`;
            
            const bubble = document.createElement('div');
            const styleClass = role === 'sent' ? 'bg-[#027AFF] text-white rounded-br-none shadow-lg shadow-blue-600/30' : 'glass-panel text-white/95 rounded-bl-none !border-white/5';
            bubble.className = `msg-bubble ${styleClass}`;
            bubble.innerText = txt;
            
            const timeTag = document.createElement('span');
            timeTag.className = 'text-[8px] opacity-20 mt-1 px-2 font-bold uppercase tracking-wider';
            timeTag.innerText = timeStr;
            
            bubbleWrap.appendChild(bubble); 
            bubbleWrap.appendChild(timeTag);
            
            const container = document.getElementById('chat-content');
            container.appendChild(bubbleWrap); 
            chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('chat-send').addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });

        function handleSend() {
            const val = chatInput.value.trim(); if(!val) return;
            sendMsg(val, 'sent'); 
            chatInput.value = '';
            chatInput.style.height = 'auto';

            if (currentChatNick === 'kaany') {
                const typing = document.getElementById('typing-container');
                if (isFirstMessageForKaany) {
                    const wait = 11000 + Math.random() * 2000;
                    setTimeout(() => {
                        typing.classList.remove('hidden'); 
                        chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
                        setTimeout(() => { typing.classList.add('hidden'); kaanyReplyLogic(val); isFirstMessageForKaany = false; }, 2800); 
                    }, wait);
                } else {
                    setTimeout(() => {
                        typing.classList.remove('hidden');
                        chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
                        setTimeout(() => { typing.classList.add('hidden'); kaanyReplyLogic(val); }, 2200);
                    }, 800);
                }
            }
        }

        function kaanyReplyLogic(val) {
            const low = val.toLowerCase();
            const typing = document.getElementById('typing-container');
            if (low.includes('günaydın')) {
                sendMsg('günaydın abi', 'received');
                setTimeout(() => {
                    typing.classList.remove('hidden'); 
                    chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
                    setTimeout(() => { typing.classList.add('hidden'); sendMsg('noldu', 'received'); }, 2000);
                }, 1200);
            } 
            else if (low.includes('naber')) sendMsg('iyidir abi senden', 'received');
            else if (low === 'kaan') sendMsg('efendim abi', 'received');
            else sendMsg(['tamam abi', 'tamamdır abi', 'bakıyorum abi'][Math.floor(Math.random() * 3)], 'received');
        }
    </script>
</body>
</html>
